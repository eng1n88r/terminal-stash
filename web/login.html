<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>stash — login</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    // Apply the saved theme before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem('hc_theme');
      if (t && t !== 'green') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="login-wrap">
    <div class="login-line">
      <span class="host">stash</span> login<span class="cursor"></span>
    </div>
    <form id="login-form">
      <div class="login-field">
        <label for="password">password:</label>
        <input id="password" name="password" type="password" autofocus autocomplete="current-password" />
      </div>
      <div class="login-actions">
        <button class="btn" type="submit">enter</button>
      </div>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = '✗ access denied';
        }
      } catch (_) {
        errEl.textContent = '✗ connection error';
      }
    });
  </script>
</body>
</html>
