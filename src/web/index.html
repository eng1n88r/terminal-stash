<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>stash</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="drag-banner">drop files to upload ▼</div>

  <div class="wrap" id="dropzone">
    <header>
      <div class="prompt">
        <span class="host">user@stash</span><span class="path">:~</span>$<span class="cursor"></span>
      </div>
      <div class="toolbar">
        <button class="btn" id="theme-btn" title="click to cycle themes">green</button>
        <button class="btn" id="logout-btn">logout</button>
      </div>
    </header>

    <section class="composer">
      <div class="compose-row">
        <div class="field">
          <span class="glyph">&gt;</span>
          <textarea id="text" placeholder="type or paste text…"></textarea>
        </div>
        <div class="toolbar">
          <button class="btn primary" id="file-btn">upload</button>
          <button class="btn primary" id="send-btn">send</button>
        </div>
      </div>
      <div class="composer-foot">
        <div class="hint">paste anywhere · drag &amp; drop files · Ctrl/Cmd+Enter to send</div>
        <div class="stats" id="stats"></div>
      </div>
      <input id="file-input" type="file" multiple hidden />
    </section>

    <section>
      <div class="col-title">// recent — newest first</div>
      <div id="feed"></div>
    </section>
  </div>

  <div id="flash" role="status"></div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
