<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>stash</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/theme-init.js"></script>
</head>
<body>
  <div class="drag-banner">drop files to upload ▼</div>

  <div class="wrap" id="dropzone">
    <div class="sticky-shell">
      <header class="topbar">
        <div class="brand">
          <div class="prompt">
            <span class="host">user@stash</span><span class="path">:~</span>$<span class="cursor"></span>
          </div>
          <div class="brand-note">shared clipboard · live on your LAN</div>
        </div>
        <div class="toolbar">
          <div class="theme-control">
            <button class="btn" id="theme-btn" aria-haspopup="true" aria-expanded="false">theme: green</button>
            <div class="theme-menu" id="theme-menu" role="menu" hidden></div>
          </div>
          <button class="btn" id="logout-btn">logout</button>
        </div>
      </header>

      <section class="composer">
        <div class="compose-row">
          <div class="field">
            <span class="glyph">&gt;</span>
            <textarea id="text" placeholder="type or paste text…"></textarea>
          </div>
          <div class="toolbar">
            <button class="btn primary" id="file-btn">upload</button>
            <button class="btn primary" id="send-btn">send</button>
          </div>
        </div>
        <div class="composer-foot">
          <div class="hint"><kbd>paste</kbd> anywhere · drop files · <kbd>Ctrl/Cmd + Enter</kbd> to send</div>
          <div class="stats" id="stats"></div>
        </div>
        <input id="file-input" type="file" multiple hidden />
      </section>
    </div>

    <section>
      <div class="feed-heading">
        <div class="col-title">// recent</div>
        <div class="sync-status" id="sync-status"><span class="status-dot"></span><span>connecting</span></div>
      </div>
      <div id="feed" aria-live="polite" aria-busy="true"><div class="empty">— loading stash… —</div></div>
    </section>
  </div>

  <div id="flash" role="status"></div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
