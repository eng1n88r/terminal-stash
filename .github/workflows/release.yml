name: release

# Builds and pushes a Docker image to Docker Hub on every version tag
# (v1.2.3 → tags 1.2.3, 1.2, 1 and latest). Requires two repository
# secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (an access token,
# not the account password — hub.docker.com → Account Settings →
# Personal access tokens, with Read & Write scope).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/terminal-stash

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Quality gate
        run: make check

      - name: Security audit
        run: make audit

  publish:
    runs-on: ubuntu-latest
    needs: check
    # Only version tags publish images; a manual workflow_dispatch run just
    # refreshes the Docker Hub overview via the job below.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # QEMU + buildx for the multi-arch (amd64 + arm64) build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Keeps the Docker Hub repository overview in sync with
  # docs/dockerhub-overview.md. Runs on releases and on manual dispatch.
  # NOTE: requires the DOCKERHUB_TOKEN PAT to have read/write/delete scope.
  overview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          short-description: Self-hosted LAN clipboard & file drop — terminal-themed, one static Go binary.
          readme-filepath: ./docs/dockerhub-overview.md
